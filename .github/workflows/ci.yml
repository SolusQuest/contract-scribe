name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: M0.5 Native AOT operation
        required: true
        type: choice
        options:
          - m05-v1-reproduction

permissions:
  contents: read

jobs:
  m05-v1-dispatch-guard:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Require the exact main ref and reproduction mode
        shell: bash
        run: |
          test "${{ inputs.mode }}" = "m05-v1-reproduction"
          test "${{ github.ref }}" = "refs/heads/main"

  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json
      - run: dotnet restore ContractScribe.slnx
      - run: dotnet build ContractScribe.slnx --configuration Release --no-restore
      - shell: pwsh
        run: pwsh -NoProfile -File tests/ContractScribe.Roslyn.NativeAot.Experiment/test-m0.5-v1-provenance.ps1
      - run: dotnet test ContractScribe.slnx --configuration Release --no-build
      - run: dotnet format ContractScribe.slnx --verify-no-changes --no-restore
      - run: dotnet run --project src/ContractScribe.Cli/ContractScribe.Cli.csproj --configuration Release --no-build -- --help
      - run: dotnet run --project src/ContractScribe.Cli/ContractScribe.Cli.csproj --configuration Release --no-build -- --version
      - run: dotnet run --project src/ContractScribe.Cli/ContractScribe.Cli.csproj --configuration Release --no-build -- doctor

  m05-native-aot-reproduction:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'm05-v1-reproduction' && github.ref == 'refs/heads/main'
    needs: m05-v1-dispatch-guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json
      - name: Reproduce committed M0.5 cell evidence
        shell: pwsh
        run: pwsh -NoProfile -File tests/ContractScribe.Roslyn.NativeAot.Experiment/reproduce-m0.5-v1.ps1 -RuntimeIdentifier ${{ matrix.rid }} -Configuration Release
      - name: Upload sanitized reproduction proof
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: m05-v1-proof-${{ matrix.rid }}-ed305a36f076d2d9aef981c44746d7a5a34d5bff
          path: TestResults/m05-v1-reproduction-proof-${{ matrix.rid }}.json
          if-no-files-found: error

  m05-native-aot-reproduction-aggregate:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'm05-v1-reproduction' && github.ref == 'refs/heads/main' && needs.m05-native-aot-reproduction.result == 'success'
    needs: m05-native-aot-reproduction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Download successful cell proofs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: m05-v1-proof-*
          path: TestResults/m05-v1-cell-proofs
          merge-multiple: true
      - name: Reproduce committed M0.5 aggregate evidence
        shell: pwsh
        run: pwsh -NoProfile -File tests/ContractScribe.Roslyn.NativeAot.Experiment/reproduce-m0.5-v1-aggregate.ps1 -Configuration Release -CellProofRoot TestResults/m05-v1-cell-proofs
      - name: Upload sanitized aggregate reproduction proof
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: m05-v1-aggregate-proof-ed305a36f076d2d9aef981c44746d7a5a34d5bff
          path: TestResults/m05-v1-reproduction-aggregate-proof.json
          if-no-files-found: error
